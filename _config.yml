# GitHub Pages + Jekyll 配置
# 用于将 Obsidian Markdown 笔记展示在 GitHub Pages 上

title: Claude 学习笔记
description: Claude Code skill-creator 完整指南和自定义 Skill 开发笔记
baseurl: "/ainote"  # 如果仓库名是 username.github.io，改为空字符串 ""
url: "https://syllr.github.io"  # 你的 GitHub Pages URL，去掉末尾斜杠

# 主题设置 - 使用 GitHub Pages 默认 minima 主题
theme: minima

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 处理 Obsidian 特性
# 忽略 Obsidian 系统目录和私有文件
exclude:
  - .obsidian/
  - .git/
  - .idea/
  - .venv/
  - .DS_Store
  - node_modules/
  - "*.log"
  - "*.tmp"

# 允许这些目录被处理
include:
  - 02-Learning/
  - _includes/
  - _layouts/

# markdown 处理器 - 使用 GitHub  flavored kramdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# 分页
pagination:
  enabled: true
  per_page: 10
  limit: 0

#  defaults - 为不同目录设置默认布局
defaults:
  - scope:
      path: "*.md"
    values:
      layout: default
  - scope:
      path: "**/*.md"
    values:
      layout: default
