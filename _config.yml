# GitHub Pages + Jekyll 配置
# 用于将 Obsidian Markdown 笔记展示在 GitHub Pages 上

title: Claude 学习笔记
description: Claude Code skill-creator 完整指南和自定义 Skill 开发笔记
baseurl: "/ainote"  # 如果仓库名是 username.github.io，改为空字符串 ""
url: "https://syllr.github.io"  # 你的 GitHub Pages URL，去掉末尾斜杠

# 主题设置 - 使用 GitHub Pages 默认 minima 主题
theme: minima

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-spaceship

# 处理 Obsidian 特性
# 忽略 Obsidian 系统目录和私有文件
exclude:
  - .obsidian/
  - .git/
  - .idea/
  - .venv/
  - .DS_Store
  - node_modules/
  - vendor/
  - 00-System/Templates/
  - "*.log"
  - "*.tmp"

# 允许这些目录被处理
include:
  - 02-Learning/
  - _includes/
  - _layouts/

# markdown 处理器 - 使用 GitHub  flavored kramdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  plantuml:
    # 使用 plantuml.com 远程渲染，输出 PNG 格式，不需要本地安装
    server_url: https://www.plantuml.com/plantuml/png/
    format: png
    raise_errors: false

# 分页
pagination:
  enabled: true
  per_page: 10
  limit: 0

#  defaults - 为不同目录设置默认布局
defaults:
  - scope:
      path: "*.md"
    values:
      layout: default
  - scope:
      path: "**/*.md"
    values:
      layout: default

# jekyll-spaceship - 多功能插件，包含 PlantUML 支持
jekyll-spaceship:
  # 只启用 PlantUML 处理器，其他功能不需要
  processors:
    - plantuml-processor
  plantuml-processor:
    mode: default              # default = 直接链接远程 SVG
    css:
      class: plantuml
    syntax:
      code: 'plantuml'         # 使用 ```plantuml 语法，去掉感叹号
      custom: ['@startuml', '@enduml']
    src: https://www.plantuml.com/plantuml/svg/
